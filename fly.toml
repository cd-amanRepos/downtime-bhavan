# fly.toml — Downtime Bhavan
#
# Single-machine model: one VM in Mumbai with the persistent volume mounted,
# running BOTH web (Next.js) and monitor (tick daemon) inside the same
# container. This is required because Fly volumes can't be shared across
# machines, and we need both processes hitting the same SQLite file.

app = "downtime-bhavan"
primary_region = "bom"      # Mumbai

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  DTB_DB_PATH = "/data/dtb.sqlite"
  DTB_CONFIG_DIR = "/app/config/sites"
  DTB_WEB_PORT = "3210"
  DTB_TICK_MS = "120000"

[[mounts]]
  source = "dtb_data"
  destination = "/data"

[http_service]
  internal_port = 3210
  force_https = true
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
