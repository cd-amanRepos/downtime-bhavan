# fly.toml — Downtime Bhavan

app = "downtime-bhavan"
primary_region = "bom"      # Mumbai

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  DTB_DB_PATH = "/data/dtb.sqlite"
  DTB_CONFIG_DIR = "/app/config/sites"
  DTB_WEB_PORT = "3210"
  DTB_TICK_MS = "120000"

[[mounts]]
  source = "dtb_data"
  destination = "/data"

[processes]
  web = "/docker-entrypoint.sh"
  monitor = "/docker-entrypoint.sh"

[[services]]
  processes = ["web"]
  internal_port = 3210
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["web", "monitor"]
